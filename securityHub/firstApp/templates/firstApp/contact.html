{% extends 'base.html' %}
{% load static %}
{% block content %}

<div>
    <div class="d-flex justify-content-center align-items-center">
 

    <img class="w-50" src="{% static 'svgs/sign-up-form(1).png' %}" alt="" srcset="">
 
    <form class="w-50">
                <h1 class="display-6 fw-bold mb-3"><span class="bg-light  rounded-start-5 ps-2">Contact </span> <span class="bg-light text-primary rounded-end-5 pe-2">Us</span></h1>

        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div> 
       
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Enter Message</label>
            <textarea type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"></textarea>
            <div id="emailHelp" class="form-text">We will respond as fast as we can.</div>
        </div> 
        <button type="submit" class="btn btn-primary rounded-pill px-5">Submit</button>
    </form>
   </div>
</div>

{% endblock %}
